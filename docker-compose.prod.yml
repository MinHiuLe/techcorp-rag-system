services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: hieule
      MINIO_ROOT_PASSWORD: hieule123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_volume:/data
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data_volume:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - GROQ_API_KEY=${GROQ_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - API_KEYS=${API_KEYS}
    volumes:
      - ./storage:/app/storage
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    depends_on:
      - qdrant
      - minio
      - redis
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/chat
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      - api
    restart: always

volumes:
  minio_data_volume:
  qdrant_data_volume:
