version: '3.8'

services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: hieule
      MINIO_ROOT_PASSWORD: hieule123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_volume:/data
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data_volume:/qdrant/storage
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=hieule
      - MINIO_SECRET_KEY=hieule123
    volumes:
      - ./storage:/app/storage
      - ./.env:/app/.env
      - .:/app
    user: "${UID}:${GID}"
    depends_on:
      - qdrant
      - minio
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/chat
    volumes:
      - .:/app  
    depends_on:
      - api
    restart: always

volumes:
  minio_data_volume:
  qdrant_data_volume: